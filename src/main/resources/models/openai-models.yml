# Overrides the bundled models/openai-models.yml from
# embabel-agent-openai-autoconfigure so the Embabel platform registers the
# latest GPT-5.4 family in addition to those shipped with version 0.3.4.
#
# Spring's DefaultResourceLoader returns the first classpath match, and the
# application's own src/main/resources is searched before dependency JARs, so
# this file replaces the bundled list at runtime.
#
# Source of latest model IDs: ./list-models.sh openai

models:
  # GPT-5.4 - latest flagship, role `best`.
  # Pricing/cutoff mirror gpt-5 until real values are confirmed.
  - name: "gpt54"
    model_id: "gpt-5.4"
    display_name: "GPT-5.4"
    knowledge_cutoff_date: "2026-01-01"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 1.25
      usd_per1m_output_tokens: 10.0
    special_handling:
      supports_temperature: false

  # GPT-5.4 Mini - balanced, role `default-llm`.
  - name: "gpt54mini"
    model_id: "gpt-5.4-mini"
    display_name: "GPT-5.4 Mini"
    knowledge_cutoff_date: "2026-01-01"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.25
      usd_per1m_output_tokens: 2.0
    special_handling:
      supports_temperature: false

  # GPT-5.4 Nano - cheapest/fastest, role `cheapest`.
  - name: "gpt54nano"
    model_id: "gpt-5.4-nano"
    display_name: "GPT-5.4 Nano"
    knowledge_cutoff_date: "2026-01-01"
    max_tokens: 8192
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.05
      usd_per1m_output_tokens: 0.40
    special_handling:
      supports_temperature: false

  # GPT-5 family - previous generation, retained for backward compatibility.
  - name: "gpt5"
    model_id: "gpt-5"
    display_name: "GPT-5"
    knowledge_cutoff_date: "2024-10-01"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 1.25
      usd_per1m_output_tokens: 10.0
    special_handling:
      supports_temperature: false

  - name: "gpt5mini"
    model_id: "gpt-5-mini"
    display_name: "GPT-5 Mini"
    knowledge_cutoff_date: "2024-05-31"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.25
      usd_per1m_output_tokens: 2.0
    special_handling:
      supports_temperature: false

  - name: "gpt5nano"
    model_id: "gpt-5-nano"
    display_name: "GPT-5 Nano"
    knowledge_cutoff_date: "2024-05-31"
    max_tokens: 8192
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.05
      usd_per1m_output_tokens: 0.40
    special_handling:
      supports_temperature: false

  # GPT-4.1 family - retained for backward compatibility.
  - name: "gpt41"
    model_id: "gpt-4.1"
    display_name: "GPT-4.1"
    knowledge_cutoff_date: "2024-08-06"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 2.0
      usd_per1m_output_tokens: 8.0

  - name: "gpt41mini"
    model_id: "gpt-4.1-mini"
    display_name: "GPT-4.1 Mini"
    knowledge_cutoff_date: "2024-07-18"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.40
      usd_per1m_output_tokens: 1.6

  - name: "gpt41nano"
    model_id: "gpt-4.1-nano"
    display_name: "GPT-4.1 Nano"
    knowledge_cutoff_date: "2024-08-06"
    max_tokens: 8192
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.1
      usd_per1m_output_tokens: 0.4

  # GPT-4o family - retained for backward compatibility.
  - name: "gpt4omini"
    model_id: "gpt-4o-mini"
    display_name: "GPT-4o Mini"
    knowledge_cutoff_date: "2023-10-01"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.15
      usd_per1m_output_tokens: 0.60

embedding_models:
  - name: "text_embedding_3_large"
    model_id: "text-embedding-3-large"
    display_name: "Text Embedding 3 Large"
    dimensions: 3072
    pricing_model:
      usd_per1m_tokens: 0.13

  - name: "text_embedding_3_small"
    model_id: "text-embedding-3-small"
    display_name: "Text Embedding 3 Small"
    dimensions: 1536
    pricing_model:
      usd_per1m_tokens: 0.02

  - name: "text_embedding_ada_002"
    model_id: "text-embedding-ada-002"
    display_name: "Text Embedding Ada 002"
    dimensions: 1536
    pricing_model:
      usd_per1m_tokens: 0.10
