server:
  port: 48080

# Enable virtual threads for better concurrency with LLM calls
spring:
  threads:
    virtual:
      enabled: true

  ai:
    mcp:
      server:
        name: embabel-demo
        version: 1.0.0
        request-timeout: 600s
        type: ASYNC

      client:
        enabled: true
        name: embabel-demo
        version: 1.0.0
        request-timeout: 600s
        type: ASYNC

