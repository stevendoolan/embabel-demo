# Use these Anthropic models
spring:
  # Skip the OpenAI and Ollama autoconfigs so the app starts without
  # OPENAI_API_KEY / an Ollama host. They unconditionally instantiate a
  # provider client at startup and would otherwise fail the bean
  # creation before the agent platform comes up.
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration
      - com.embabel.agent.autoconfigure.models.ollama.AgentOllamaAutoConfiguration

embabel:
  models:
    default-llm: claude-sonnet-4-5
    llms:
      best: claude-opus-4-1
      cheapest: claude-sonnet-4-5

# Requires the following Environment Variables to be set:
# export ANTHROPIC_API_KEY=<your_api_key>
