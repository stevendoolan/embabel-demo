# Use these OpenAI models
spring:
  # Skip the Anthropic and Ollama autoconfigs so the app starts without
  # ANTHROPIC_API_KEY / an Ollama host. They unconditionally instantiate
  # a provider client at startup and would otherwise fail the bean
  # creation before the agent platform comes up.
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
      - com.embabel.agent.autoconfigure.models.ollama.AgentOllamaAutoConfiguration

embabel:
  models:
    default-llm: gpt-4.1
    llms:
      best: gpt-4.1
      cheapest: gpt-4.1-mini

# Private OpenAI
# -----------------------------
# Requires the following Environment Variables to be set for a Private OpenAI instance:
# export OPENAI_BASE_URL (optional, defaults to https://api.openai.com/v1 if not set)
# export OPENAI_API_KEY=<your_api_key>

# Public OpenAI
# -----------------------------
# WARNING! DO NOT USE THIS, IS IT NOT SECURE AND MAY RECORD YOUR PROMPTS!
# Requires the following Environment Variables to be set for OpenAI's public API:
# export OPENAI_API_KEY=<your_api_key>
